<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Next Gym · Atención al socio</title>

  <style>
    :root {
      --orange:#ff7a00;
      --black:#111;
      --white:#fff;
    }

    body{
      margin:0;
      font-family:Arial;
      background:#111;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .qr-panel{
      background:#fff;
      color:#000;
      padding:30px;
      border-radius:20px;
      text-align:center;
    }

    #qrcode{
      margin-top:20px;
    }
  </style>
</head>

<body>

<div class="qr-panel">
  <h2>Escanea para solicitar ayuda</h2>
  <div id="qrcode"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
  const publicUrl = window.location.href;

  const qrContainer = document.getElementById("qrcode");

  new QRCode(qrContainer,{
    text: publicUrl,
    width:220,
    height:220
  });
</script>

</body>
</html>
