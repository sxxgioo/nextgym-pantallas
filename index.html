<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Gym</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}
.header{
  background:#ff7a00;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:#000;
}
.logo{
  height:40px;
  display:none;
}
.panel{padding:20px;}
.hidden{display:none;}

.btn{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
.btn-primary{background:#ff7a00;color:#000;}
.btn-danger{background:red;color:#fff;}
.btn-secondary{background:#333;color:#fff;}

input{
  padding:10px;
  border-radius:8px;
  border:none;
  width:100%;
}
</style>
</head>

<body>

<div class="header">
  <div>
    <img id="logo" class="logo">
    Next Gym
  </div>
  <span id="mode"></span>
</div>

<div id="login" class="panel hidden">
  <h2>Login</h2>
  <input id="user" placeholder="usuario">
  <br><br>
  <input id="pass" type="password" placeholder="contraseña">
  <br><br>
  <button onclick="login()" class="btn btn-primary">Entrar</button>
</div>

<div id="screen" class="panel">
  <h1>¿Necesitas ayuda?</h1>
  <button class="btn btn-primary" onclick="send()">Solicitar ayuda</button>
</div>

<div id="admin" class="panel hidden">

  <h2>Panel interno</h2>

  <button class="btn btn-primary" onclick="setAvailable()">Disponible</button>
  <button class="btn btn-danger" onclick="setBusy()">No disponible</button>

  <hr>

  <h3>Enlaces pantallas</h3>
  <a id="link1" target="_blank"></a><br>
  <a id="link2" target="_blank"></a>

  <hr>

  <h3>Logo</h3>
  <input type="file" id="logoFile">
  <button onclick="saveLogo()" class="btn btn-primary">Guardar logo</button>

  <hr>

  <div id="usersBox">
    <h3>Usuarios</h3>
    <input id="newUser" placeholder="email">
    <input id="newPass" placeholder="password">
    <button onclick="createUser()" class="btn btn-primary">Crear</button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyB_C4gc8esz6wNIiW17Ig0I9oRtNr1g_bE",
  authDomain: "nextgym-402e3.firebaseapp.com",
  projectId: "nextgym-402e3"
});

const db = getFirestore(app);
const roomRef = doc(db,"rooms","nextgym");

const params = new URLSearchParams(location.search);
const isAdmin = params.get("admin") === "1";

const VDO_LINKS = {
  '1': 'https://vdo.ninja/?director=Recepcion_Next_Gym_Alcobendas&password=NoLimits2026&push=fZG4QSq',
  '2': 'https://vdo.ninja/?director=Recepcion_Next_Gym_Alcobendas&password=NoLimits2026&push=fZG4QSq'
};

const USERS = [
  {u:"sergio.santidrian@nextgym.es",p:"@Oigres150303",role:"admin"},
  {u:"alicia.lara@nextgym.es",p:"NoLimits2026",role:"user"},
  {u:"veronica.linares@nextgym.es",p:"NoLimits2026",role:"user"}
];

let currentUser=null;

document.getElementById("mode").innerText = isAdmin ? "ADMIN" : "PANTALLA";

if(isAdmin){
  document.getElementById("screen").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
}else{
  loadLogo();
}

function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  let user=USERS.find(x=>x.u===u && x.p===p);
  if(!user) return alert("Error login");

  currentUser=user;

  document.getElementById("login").classList.add("hidden");
  document.getElementById("admin").classList.remove("hidden");

  if(user.role!=="admin"){
    document.getElementById("usersBox").style.display="none";
  }

  loadLogo();
  loadLinks();
}

function loadLinks(){
  document.getElementById("link1").href=location.origin+location.pathname+"?p=1";
  document.getElementById("link1").innerText="Pantalla 1";

  document.getElementById("link2").href=location.origin+location.pathname+"?p=2";
  document.getElementById("link2").innerText="Pantalla 2";
}

async function loadLogo(){
  const snap=await getDoc(roomRef);
  if(!snap.exists()) return;

  let logo=snap.data().logo;

  if(logo){
    let img=document.getElementById("logo");
    img.src=logo;
    img.style.display="block";
  }
}

async function saveLogo(){
  if(currentUser.role!=="admin") return alert("solo admin");

  let file=document.getElementById("logoFile").files[0];
  let reader=new FileReader();

  reader.onload=async e=>{
    await updateDoc(roomRef,{logo:e.target.result});
    alert("logo guardado");
    loadLogo();
  };

  reader.readAsDataURL(file);
}

async function send(){
  alert("Aviso enviado");

  window.open(VDO_LINKS['1'],"_blank");
}

function setAvailable(){ alert("Disponible"); }
function setBusy(){ alert("No disponible"); }

function createUser(){
  alert("Usuarios locales, versión simple");
}

</script>

</body>
</html>
