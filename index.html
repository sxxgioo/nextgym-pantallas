<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Gym · Atención</title>
<style>
body{margin:0;font-family:Arial;background:#111;color:#fff;text-align:center}
.container{padding:20px}
.btn{padding:15px 20px;margin:10px;border:none;border-radius:10px;font-weight:bold;cursor:pointer}
.primary{background:#ff7a00;color:#000}
.green{background:#22c55e}
.red{background:#ef4444}
</style>
</head>

<body>
<div class="container">

<h1 id="title">Next Gym</h1>
<p id="status">Disponible</p>

<button id="btnHelp" class="btn primary">Solicitar ayuda</button>

<div id="adminPanel" style="display:none">
<h2>Panel interno</h2>
<button id="btnAvailable" class="btn green">Disponible</button>
<button id="btnBusy" class="btn red">Ocupado</button>
<button id="btnZoom" class="btn primary">Abrir Zoom</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

// 🔥 TU FIREBASE (ya integrado)
const firebaseConfig = {
  apiKey: "AIzaSyB_C4gc8esz6wNIiW17Ig0I9oRtNr1g_bE",
  authDomain: "nextgym-402e3.firebaseapp.com",
  projectId: "nextgym-402e3",
  storageBucket: "nextgym-402e3.firebasestorage.app",
  messagingSenderId: "386550395511",
  appId: "1:386550395511:web:2725708cb37372a5f28c72"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 CONFIG
const ZOOM_LINK = "https://zoom.us/j/83560160551";

// 🔥 MODOS
const params = new URLSearchParams(window.location.search);
const isAdmin = params.get("admin") === "1";

if(isAdmin){
document.getElementById("adminPanel").style.display="block";
}

// 🔥 REFERENCIA FIREBASE
const stateRef = doc(db, "gym", "state");

// 🔥 ESCUCHA CAMBIOS
onSnapshot(stateRef, (docSnap)=>{
if(docSnap.exists()){
const data = docSnap.data();

document.getElementById("status").innerText = data.status;

if(data.call){
window.open("zoommtg://zoom.us/join?confno=83560160551");
setTimeout(()=>window.open(ZOOM_LINK),1000);
}
}
});

// 🔥 BOTONES

document.getElementById("btnHelp").onclick = ()=>{
setDoc(stateRef,{status:"Llamando...",call:true});
};

document.getElementById("btnAvailable").onclick = ()=>{
setDoc(stateRef,{status:"Disponible",call:false});
};

document.getElementById("btnBusy").onclick = ()=>{
setDoc(stateRef,{status:"Ocupado",call:false});
};

document.getElementById("btnZoom").onclick = ()=>{
window.open("zoommtg://zoom.us/join?confno=83560160551");
setTimeout(()=>window.open(ZOOM_LINK),1000);
};

</script>

</body>
</html>
