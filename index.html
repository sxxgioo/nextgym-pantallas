<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Gym · Atención al socio</title>

<style>
:root {
  --orange: #ff7a00;
  --black: #111;
  --white: #fff;
}

body {
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(90deg,#ff7a00,#ff9e45);
  padding:15px 20px;
  color:#000;
}

.brand-wrap {
  display:flex;
  align-items:center;
  gap:12px;
}

.brand-logo {
  height:40px;
}

/* BOTONES */
.btn {
  padding:10px 14px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
.btn-primary {background:var(--orange);}
.btn-success {background:#22c55e;}
.btn-danger {background:#ef4444;color:#fff;}
.btn-secondary {background:#333;color:#fff;}

/* PANEL */
.section-card {
  background:#1a1a1a;
  border-radius:12px;
  padding:15px;
  margin-bottom:15px;
}

.section-head {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.toggle-visibility-btn {
  background:#333;
  border:none;
  color:#fff;
  border-radius:8px;
  padding:6px 10px;
  cursor:pointer;
}

.hidden-section {display:none}

/* LOGIN */
.login {
  position:fixed;
  inset:0;
  background:#000d;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box {
  background:#222;
  padding:20px;
  border-radius:15px;
  width:300px;
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="login-box">
    <h3>Login</h3>
    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()" class="btn btn-primary">Entrar</button>
    <p id="error"></p>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="brand-wrap">
    <img id="logo" class="brand-logo">
    <span>Atención al socio</span>
  </div>
</div>

<!-- PANEL -->
<div style="padding:20px">

  <div class="section-card">
    <div class="section-head">
      <h3>Estado</h3>
      <button class="toggle-visibility-btn" onclick="toggle('estado')">👁</button>
    </div>
    <div id="estado">
      <button class="btn btn-success">Disponible</button>
      <button class="btn btn-danger">No disponible</button>
    </div>
  </div>

  <div class="section-card">
    <div class="section-head">
      <h3>Automatizaciones</h3>
      <button class="toggle-visibility-btn" onclick="toggle('auto')">👁</button>
    </div>
    <div id="auto">
      <button class="btn btn-secondary">Alarma</button>
      <button class="btn btn-secondary">Auto ocupado</button>
    </div>
  </div>

</div>

<script>

/* =========================
   LOGO (GUARDADO)
========================= */

const DEFAULT_LOGO = "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD...";
const LOGO_KEY = "logo";

function loadLogo(){
  let logo = localStorage.getItem(LOGO_KEY);
  if(!logo){
    logo = DEFAULT_LOGO;
    localStorage.setItem(LOGO_KEY, logo);
  }
  document.getElementById("logo").src = logo;
}

/* =========================
   LOGIN
========================= */

const USERS = [
  {user:"sergio.santidrian@nextgym.es",pass:"@Oigres150303",role:"admin"},
  {user:"alicia.lara@nextgym.es",pass:"NoLimits2026",role:"user"},
  {user:"veronica.linares@nextgym.es",pass:"NoLimits2026",role:"user"}
];

function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  const user = USERS.find(x=>x.user===u && x.pass===p);

  if(!user){
    document.getElementById("error").innerText="Credenciales incorrectas";
    return;
  }

  sessionStorage.setItem("user",JSON.stringify(user));
  document.getElementById("login").style.display="none";
}

/* =========================
   TOGGLE SECCIONES
========================= */

function toggle(id){
  const el = document.getElementById(id);
  el.classList.toggle("hidden-section");
}

/* INIT */
loadLogo();

</script>

</body>
</html>
